<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Vitesse · Insights</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html { scrollbar-gutter: stable; overflow-y: scroll; overflow-x: hidden; }
  html, body { margin: 0; padding: 0; background: #FFFFFF; }
  body { min-width: 820px; }
  *, *::before, *::after { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(10,10,10,0.18); border-radius: 999px; }

  /* Tweakable UI font sizes — every non-headline text size scales with --ui-scale. */
  :root {
    --ui-scale: 0.98;
    --fs-11: calc(11px * var(--ui-scale));
    --fs-12: calc(12px * var(--ui-scale));
    --fs-13: calc(13px * var(--ui-scale));
    --fs-14: calc(14px * var(--ui-scale));
    --fs-15: calc(15px * var(--ui-scale));
    --fs-19: calc(19px * var(--ui-scale));
  }

  @keyframes runwayFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  @keyframes hintIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="explain-panel.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(
    <Dashboard/>
  );
</script>
  <script>
  function postHeight() {
    parent.postMessage(
      { type: 'dashboard-height', height: document.documentElement.scrollHeight },
      '*'
    );
  }
  window.addEventListener('load', postHeight);
  new ResizeObserver(postHeight).observe(document.body);
</script>
</body>
</html>
